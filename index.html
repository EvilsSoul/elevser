<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>승강기 관리</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap');
:root{
  --bg:#F8FAFC; --bg2:#FFFFFF; --bg3:#F1F5F9;
  --card:#FFFFFF; --card2:#F8FAFC;
  --border:#E2E8F0; --border2:#CBD5E1;
  --p:#2563EB; --p2:#3B82F6; --pl:#DBEAFE;
  --green:#059669; --greenl:#D1FAE5;
  --amber:#D97706; --amberl:#FEF3C7;
  --red:#DC2626; --redl:#FEE2E2;
  --purple:#7C3AED; --purplel:#EDE9FE;
  --txt:#0F172A; --txt2:#475569; --txt3:#94A3B8;
  --nav:56px; --bot:62px; --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:14px;overscroll-behavior:none;}

/* 로그인 */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#EFF6FF 0%,#DBEAFE 100%);
  position:relative;z-index:200;}
.lcard{background:white;border:1px solid var(--border);border-radius:20px;padding:36px 28px;
  width:320px;box-shadow:0 8px 40px rgba(0,0,0,.1);}
.llogo{font-size:32px;text-align:center;margin-bottom:6px;}
.ltitle{color:var(--p);font-size:18px;font-weight:800;text-align:center;margin-bottom:2px;}
.lsub{color:var(--txt3);font-size:12px;text-align:center;margin-bottom:24px;}
.linp{width:100%;padding:11px 14px;border:1.5px solid var(--border2);border-radius:10px;
  font-size:14px;font-family:inherit;outline:none;color:var(--txt);margin-bottom:10px;background:white;}
.linp:focus{border-color:var(--p);}
.lbtn{width:100%;padding:13px;background:var(--p);color:white;border:none;border-radius:10px;
  font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.lbtn:active{background:#1D4ED8;}
.lerr{color:var(--red);font-size:12px;text-align:center;margin-top:8px;min-height:16px;}

/* 앱 */
#app{display:none;flex-direction:column;min-height:100vh;}
.header{position:fixed;top:0;left:0;right:0;height:var(--nav);background:white;
  border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;
  z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.htitle{font-size:16px;font-weight:800;flex:1;color:var(--txt);}
.huser{font-size:11px;color:var(--txt3);}
.hlout{font-size:11px;background:none;border:1px solid var(--border2);border-radius:6px;
  padding:4px 10px;cursor:pointer;color:var(--txt2);margin-left:8px;}

.content{margin-top:var(--nav);margin-bottom:var(--bot);padding:14px;}
.panel{display:none;} .panel.active{display:block;}

/* 하단 탭 */
.bnav{position:fixed;bottom:0;left:0;right:0;height:var(--bot);background:white;
  border-top:1px solid var(--border);display:flex;z-index:100;}
.tbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;border:none;background:none;cursor:pointer;color:var(--txt3);}
.tbtn.active{color:var(--p);}
.tbtn .ticon{font-size:20px;} .tbtn .tlabel{font-size:10px;font-weight:700;}

/* 공통 */
.card{background:white;border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;}
.card-sm{padding:10px 13px;margin-bottom:6px;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-blue{background:var(--pl);color:var(--p);}
.badge-green{background:var(--greenl);color:var(--green);}
.badge-amber{background:var(--amberl);color:var(--amber);}
.badge-red{background:var(--redl);color:var(--red);}
.badge-gray{background:var(--bg3);color:var(--txt3);}
.section-title{font-size:12px;font-weight:700;color:var(--txt3);text-transform:uppercase;
  letter-spacing:.06em;margin:14px 0 8px;}
.btn{border:none;border-radius:8px;cursor:pointer;font-weight:700;font-family:inherit;display:inline-flex;align-items:center;gap:4px;}
.btn:active{opacity:.8;}
.btn-primary{background:var(--p);color:white;padding:9px 16px;font-size:13px;}
.btn-green{background:var(--green);color:white;padding:9px 16px;font-size:13px;}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:7px;}
.btn-ghost{background:var(--bg3);color:var(--txt2);border:1px solid var(--border2);}
.btn-danger{background:var(--redl);color:var(--red);border:1px solid #FCA5A5;}

/* 홈 요약 */
.summary-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px;}
.sum-card{background:white;border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;}
.sum-num{font-size:28px;font-weight:900;line-height:1.1;}
.sum-lbl{font-size:11px;color:var(--txt3);margin-top:3px;}
.sum-blue .sum-num{color:var(--p);}
.sum-green .sum-num{color:var(--green);}
.sum-amber .sum-num{color:var(--amber);}
.sum-red .sum-num{color:var(--red);}
.prog-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:8px;}
.prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .4s;}

/* 점검 카드 */
.insp-group{background:white;border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.insp-group-head{padding:13px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid transparent;}
.insp-group-head.expanded{border-bottom-color:var(--border);}
.insp-group-head:active{background:var(--bg3);}
.igh-name{font-size:14px;font-weight:700;}
.igh-sub{font-size:11px;color:var(--txt3);margin-top:1px;}
.igh-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.prog-circle{font-size:12px;font-weight:700;}
.insp-group-body{display:none;background:var(--bg);}
.insp-group-body.open{display:block;}

/* 호기 행 */
.unit-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);gap:8px;background:white;}
.unit-row:last-child{border-bottom:none;}
.unit-row.checked{background:#F0FDF4;}
.ur-name{font-size:13px;font-weight:600;min-width:56px;}
.ur-note{flex:1;font-size:11px;color:var(--amber);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ur-btn{border:none;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:700;
  cursor:pointer;font-family:inherit;white-space:nowrap;}
.ur-btn.done{background:var(--greenl);color:var(--green);}
.ur-btn.todo{background:var(--bg3);color:var(--txt3);border:1px solid var(--border2);}

/* 직접입력 항목 */
.custom-row{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border);gap:8px;background:#FFFBEB;}
.custom-row:last-child{border-bottom:none;}

/* 달력 */
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-nav-btn{background:white;border:1px solid var(--border2);color:var(--txt2);font-size:18px;
  width:36px;height:36px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cal-month-lbl{font-size:17px;font-weight:800;color:var(--txt);}
.cal-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-bottom:12px;}
.cal-dl{text-align:center;font-size:10px;font-weight:700;color:var(--txt3);padding:4px 0;}
.cal-dl:first-child{color:var(--red);} .cal-dl:last-child{color:var(--p);}
.cal-cell{min-height:54px;background:white;border:1.5px solid var(--border);border-radius:8px;
  padding:4px 3px;cursor:pointer;transition:border-color .1s;}
.cal-cell:active{background:var(--pl);}
.cal-cell.today{border-color:var(--p);}
.cal-cell.selected{border-color:var(--green);background:#F0FDF4;}
.cal-cell.has-sched{background:var(--bg3);}
.cal-num{font-size:12px;font-weight:700;color:var(--txt);}
.cal-num.sun{color:var(--red);} .cal-num.sat{color:var(--p);}
.cal-dots{margin-top:2px;}
.cal-dot{font-size:8px;color:var(--p);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;padding:0 1px;}
.cal-dot.custom{color:var(--amber);}
.cal-detail-area{min-height:80px;}
.cal-detail-title{font-size:14px;font-weight:700;margin-bottom:8px;padding:0 2px;}

/* 트리 */
.tree-item{background:white;border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;overflow:hidden;}
.tree-head{padding:12px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.tree-head:active{background:var(--bg3);}
.tree-label{flex:1;font-size:14px;font-weight:700;}
.tree-meta{font-size:11px;color:var(--txt3);}
.tree-body{border-top:1px solid var(--border);}
.tree-bld{padding:8px 14px 8px 26px;display:flex;align-items:center;justify-content:space-between;
  font-size:13px;font-weight:600;color:var(--txt2);border-bottom:1px solid var(--border);background:var(--bg3);}
.tree-unit{padding:6px 14px 6px 40px;display:flex;align-items:center;justify-content:space-between;
  font-size:12px;color:var(--txt3);border-bottom:1px solid var(--border);}
.tree-unit:last-child{border-bottom:none;}
.tree-actions{padding:8px 12px;display:flex;gap:5px;flex-wrap:wrap;border-top:1px solid var(--border);background:var(--bg3);}

/* 이력 탭 */
.filter-row{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;
  border:1.5px solid var(--border2);background:white;color:var(--txt3);cursor:pointer;}
.chip.on{background:var(--p);color:white;border-color:var(--p);}
.search{width:100%;padding:10px 14px;background:white;border:1.5px solid var(--border2);
  border-radius:10px;font-size:14px;font-family:inherit;outline:none;color:var(--txt);margin-bottom:10px;}
.search:focus{border-color:var(--p);}

/* 모달 */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;
  display:flex;align-items:flex-end;justify-content:center;}
.ms{background:white;border-radius:20px 20px 0 0;border-top:1px solid var(--border);
  width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:16px 18px 36px;
  animation:slideUp .2s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.mo-drag{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 14px;}
.mo-title{font-size:16px;font-weight:700;margin-bottom:14px;}
.flbl{font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:4px;margin-top:12px;display:block;}
.finp,.fsel,.fta{width:100%;padding:10px 12px;background:white;border:1.5px solid var(--border2);
  border-radius:9px;font-size:14px;font-family:inherit;color:var(--txt);outline:none;}
.finp:focus,.fsel:focus,.fta:focus{border-color:var(--p);}
.fta{min-height:80px;resize:vertical;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fbtns{display:flex;gap:8px;margin-top:16px;}
.fbtns button{flex:1;padding:12px;border-radius:9px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:inherit;}
.tab-sw{display:flex;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:14px;}
.sw-btn{flex:1;padding:8px;border:none;border-radius:7px;font-size:13px;font-weight:600;
  cursor:pointer;background:none;color:var(--txt3);font-family:inherit;}
.sw-btn.active{background:white;color:var(--p);box-shadow:0 1px 3px rgba(0,0,0,.1);}

/* 그룹 선택 모달 */
.sched-picker{border:1.5px solid var(--border2);border-radius:9px;overflow:hidden;margin-top:4px;}
.sched-pick-item{padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid var(--border);}
.sched-pick-item:last-child{border-bottom:none;}
.sched-pick-item:active{background:var(--pl);}
.sched-pick-item.selected{background:var(--pl);}
.spi-name{flex:1;font-size:13px;font-weight:600;}
.spi-sub{font-size:11px;color:var(--txt3);}
.spi-check{color:var(--p);font-size:16px;font-weight:700;}

/* 빈 상태 */
.empty{text-align:center;padding:36px 12px;}
.empty-icon{font-size:40px;margin-bottom:10px;}
.empty-text{font-size:13px;color:var(--txt3);line-height:1.6;}

/* 타임라인 */
.tl-item{display:flex;gap:10px;margin-bottom:10px;}
.tl-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:2px;}
.tl-note-dot{background:var(--pl);} .tl-maint-dot{background:var(--greenl);}
.tl-content{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:8px 11px;flex:1;}
.tl-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px;}
.tl-date{font-size:11px;font-weight:700;color:var(--txt2);}
.tl-author{font-size:11px;color:var(--p);font-weight:600;}
.tl-body{font-size:12px;color:var(--txt3);line-height:1.5;}

/* 힌트 텍스트 */
.hint{font-size:11px;color:var(--txt3);margin-top:4px;line-height:1.4;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.loading{display:flex;align-items:center;justify-content:center;padding:32px;color:var(--txt3);font-size:13px;gap:8px;}
.spin{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

@media(min-width:560px){
  .content,.bnav{max-width:560px;margin-left:auto;margin-right:auto;}
  .bnav{left:50%;transform:translateX(-50%);border-left:1px solid var(--border);border-right:1px solid var(--border);}
}

/* 현장 스크롤 드롭다운 */
.site-dropdown-wrap{position:relative;margin-bottom:12px;}
.site-dropdown-btn{width:100%;padding:10px 14px;background:white;border:1.5px solid var(--border2);
  border-radius:10px;font-size:14px;font-family:inherit;color:var(--txt);outline:none;
  cursor:pointer;display:flex;align-items:center;justify-content:space-between;text-align:left;}
.site-dropdown-btn:focus{border-color:var(--p);}
.site-dropdown-list{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:white;border:1.5px solid var(--border2);border-radius:10px;
  z-index:50;max-height:220px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.12);}
.site-dropdown-list.open{display:block;}
.sdl-item{padding:11px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;}
.sdl-item:last-child{border-bottom:none;}
.sdl-item:active{background:var(--pl);}
.sdl-item.selected{background:var(--pl);font-weight:700;}
.sdl-item .sdl-check{color:var(--p);font-weight:900;display:none;}
.sdl-item.selected .sdl-check{display:block;}
.sdl-cnt{font-size:11px;color:var(--txt3);}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login">
  <div class="lcard">
    <div class="llogo">🏢</div>
    <div class="ltitle">승강기 관리</div>
    <div class="lsub">계정으로 로그인하세요</div>
    <input class="linp" id="lid" type="text" placeholder="아이디" autocomplete="username">
    <input class="linp" id="lpw" type="password" placeholder="비밀번호" autocomplete="current-password">
    <button class="lbtn" onclick="doLogin()">로그인</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<!-- 앱 -->
<div id="app">
  <div class="header">
    <div class="htitle">🏢 승강기 관리</div>
    <span class="huser" id="huser"></span>
    <button class="hlout" onclick="doLogout()">로그아웃</button>
  </div>

  <div class="content">
    <!-- ① 홈 -->
    <div class="panel active" id="panel-home">
      <div id="home-content"><div class="loading"><div class="spin"></div>불러오는 중...</div></div>
    </div>

    <!-- ② 점검 (달력) -->
    <div class="panel" id="panel-insp">
      <div class="cal-nav-row">
        <button class="cal-nav-btn" onclick="calMove(-1)">&#8249;</button>
        <div class="cal-month-lbl" id="cal-lbl"></div>
        <button class="cal-nav-btn" onclick="calMove(1)">&#8250;</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="cal-detail-area" id="cal-detail"></div>
    </div>

    <!-- ③ 현장 -->
    <div class="panel" id="panel-sites">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="font-size:16px;font-weight:700">현장 관리</div>
        <button class="btn btn-sm btn-primary" onclick="openSiteModal()">+ 현장</button>
      </div>
      <input class="search" id="site-q" placeholder="🔍 현장 검색..." oninput="renderSites()">
      <div id="sites-list"><div class="loading"><div class="spin"></div></div></div>
    </div>

    <!-- ④ 이력 -->
    <div class="panel" id="panel-history">
      <div class="tab-sw">
        <button class="sw-btn active" id="sw-maint" onclick="switchHist('maint',this)">🔧 유지보수 이력</button>
        <button class="sw-btn" id="sw-events" onclick="switchHist('events',this)">📆 일정</button>
      </div>
      <div id="hist-maint">
        <div style="display:flex;gap:8px;margin-bottom:10px">
          <button class="btn btn-sm btn-green" onclick="openRegModal('maint')" style="flex:1">+ 유지보수 이력 등록</button>
        </div>
        <div class="filter-row" style="margin-bottom:8px">
          <div class="chip" id="done-chip-all" onclick="setDoneFilter('all',this)">전체</div>
          <div class="chip" id="done-chip-done" onclick="setDoneFilter('done',this)">완료</div>
          <div class="chip on" id="done-chip-undone" onclick="setDoneFilter('undone',this)">미완료</div>
        </div>
        <!-- 현장 스크롤 드롭다운 -->
        <div class="site-dropdown-wrap" id="maint-dd-wrap">
          <button class="site-dropdown-btn" onclick="toggleDD('maint')">
            <span id="maint-dd-label">전체 현장</span>
            <span style="color:var(--txt3);font-size:12px">▾</span>
          </button>
          <div class="site-dropdown-list" id="maint-dd-list"></div>
        </div>
        <div class="filter-row" id="mchips">
          <div class="chip on" onclick="setMF('전체',this)">전체</div>
          <div class="chip" onclick="setMF('교체',this)">교체</div>
          <div class="chip" onclick="setMF('수리',this)">수리</div>
          <div class="chip" onclick="setMF('점검',this)">점검</div>
          <div class="chip" onclick="setMF('기타',this)">기타</div>
        </div>
        <div id="maint-list"></div>
      </div>
      <div id="hist-events" style="display:none">
        <div style="display:flex;gap:8px;margin-bottom:10px">
          <button class="btn btn-sm btn-ghost" onclick="openEventModal()" style="flex:1">+ 일정 추가</button>
        </div>
        <!-- 완료 상태 칩 -->
        <div class="filter-row" style="margin-bottom:8px">
          <div class="chip" id="ev-chip-all" onclick="setEvDoneFilter('all',this)">전체</div>
          <div class="chip" id="ev-chip-done" onclick="setEvDoneFilter('done',this)">완료</div>
          <div class="chip on" id="ev-chip-undone" onclick="setEvDoneFilter('undone',this)">미완료</div>
        </div>
        <!-- 현장 드롭다운 -->
        <div class="site-dropdown-wrap" id="ev-dd-wrap">
          <button class="site-dropdown-btn" onclick="toggleDD('ev')">
            <span id="ev-dd-label">전체 현장</span>
            <span style="color:var(--txt3);font-size:12px">▾</span>
          </button>
          <div class="site-dropdown-list" id="ev-dd-list"></div>
        </div>
        <div id="events-list"></div>
      </div>
    </div>
  </div>

  <nav class="bnav">
    <button class="tbtn active" onclick="switchTab('home',this)"><span class="ticon">🏠</span><span class="tlabel">홈</span></button>
    <button class="tbtn" onclick="switchTab('insp',this)"><span class="ticon">📅</span><span class="tlabel">점검</span></button>
    <button class="tbtn" onclick="switchTab('sites',this)"><span class="ticon">🏢</span><span class="tlabel">현장</span></button>

async function api(m,p,b,extraHeaders){
  const headers={...H,...(extraHeaders||{})};
  const o={method:m,headers};if(b)o.body=JSON.stringify(b);
  const r=await fetch(`${SB}/rest/v1/${p}`,o);
  if(!r.ok)throw new Error(await r.text());
  return r.status===204?null:r.json();
}
async function sha256(s){
  const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

// ══ 점검계획표 유틸 ══════════════════════════════════════════════
function parseBldRange(text){
  if(!text)return{names:[],includeShuttle:false};
  const includeShuttle=/\+\s*(셔틀|shuttle)/i.test(text);
  // +셔틀 키워드 제거 후 동 범위 파싱
  const clean=text.replace(/\+\s*(셔틀|shuttle)/i,'').trim();
  const m=clean.match(/(\d+)\s*동?\s*[~～\-]\s*(\d+)\s*동/);
  if(m){const s=parseInt(m[1]),e=parseInt(m[2]),res=[];for(let i=s;i<=e;i++)res.push(i+'동');return{names:res,includeShuttle};}
  const m2=clean.match(/(\d+)\s*동/);if(m2)return{names:[m2[1]+'동'],includeShuttle};
  return{names:[],includeShuttle};
}

function getSchedForDate(ds){
  if(!sched?.plans)return[];
  const result=[];const seen=new Set();
  Object.values(sched.plans).forEach(plan=>{
    if(!plan.schedule)return;
    (plan.schedule[ds]||[]).forEach(item=>{
      if(!item)return;
      const key=typeof item==='object'?'__custom__'+(item.text||''):item.trim();
      if(seen.has(key))return;seen.add(key);

      // 직접입력 항목
      if(typeof item==='object'){
        result.push({isCustom:true,customText:item.text||'',customColor:item.color||'#374151',
          aptName:item.text||'',bldText:'',site:null,bldData:[],directUnits:[],totalUnits:0});
        return;
      }

      const lines=item.split('\n');
      const aptName=lines[0].trim();
      const bldText=lines[1]?.trim()||'';
      const {names:bldNames,includeShuttle}=parseBldRange(bldText);

      const matchedSite=sites.find(s=>(s.sched_group&&s.sched_group===aptName)||s.name===aptName||s.name.startsWith(aptName));
      let matchedBlds=[];
      if(matchedSite){
        const allBlds=buildings.filter(b=>b.site_id===matchedSite.id);
        if(bldNames.length>0){
          matchedBlds=allBlds.filter(b=>bldNames.some(bn=>b.name===bn||b.name.replace('동','')===bn.replace('동','')));
          if(!matchedBlds.length)matchedBlds=allBlds;
        }else matchedBlds=allBlds;
      }
      const bldData=matchedBlds.map(b=>({bld:b,units:units.filter(u=>u.building_id===b.id)}));
      // 이 일정 항목의 key (aptName\nbldText 또는 aptName)
      const itemKey=bldText?`${aptName}\n${bldText}`:aptName;
      // 동 없는 호기 포함 조건:
      // 1) 동 범위 없음 → 전체 직속 호기 포함
      // 2) 동 범위 있음 → sched_group이 이 itemKey와 일치하는 호기만 포함
      // 3) +셔틀 → 모든 직속 호기 포함
      let directUnits=[];
      if(matchedSite){
        const allDirect=units.filter(u=>u.site_id===matchedSite.id&&!u.building_id);
        if(!bldNames.length||includeShuttle){
          // 동 범위 없거나 +셔틀: 모든 직속 호기
          directUnits=allDirect;
        } else {
          // 동 범위 있음: sched_group이 일치하는 호기만
          directUnits=allDirect.filter(u=>{
            if(!getUnitGroup(u.id))return false;
            return getUnitGroup(u.id)===itemKey||getUnitGroup(u.id)===aptName;
          });
        }
      }
      const totalUnits=bldData.reduce((s,b)=>s+b.units.length,0)+directUnits.length;
      result.push({isCustom:false,aptName,bldText,site:matchedSite||null,bldData,directUnits,totalUnits,includeShuttle});
    });
  });
  return result;
}

function isChecked(unitId,ds){return checks.some(c=>c.unit_id===unitId&&c.checked_date===ds);}
async function toggleCheck(unitId,ds){
  // checks 는 오늘 이후만 로드되므로 과거 날짜는 DB에서 직접 확인
  let done;
  if(ds < todayStr()){
    try{
      const rows=await api('GET',`inspection_checks?unit_id=eq.${unitId}&checked_date=eq.${ds}&select=id`);
      done=rows&&rows.length>0;
    }catch(e){ done=false; }
  } else {
    done=isChecked(unitId,ds);
  }
  try{
    if(done){
      await api('DELETE',`inspection_checks?unit_id=eq.${unitId}&checked_date=eq.${ds}`);
    } else {
      // Upsert 방식: 중복 시 무시 (onConflict=ignore)
      await api('POST','inspection_checks',
        {user_id:me.id,unit_id:unitId,checked_date:ds},
        {'Prefer':'resolution=ignore-duplicates,return=representation'}
      );
    }
    // checks 갱신: 오늘 이후 + 현재 선택 날짜(과거일 수 있음) 포함
    const today=todayStr();
    const minDate=ds<today?ds:today;
    checks=await api('GET',`inspection_checks?${gf()}&checked_date=gte.${minDate}&order=checked_date.asc`).catch(()=>[]);
    renderHome();renderCalendar();
    if(calSel)renderCalDetail(calSel);
  }catch(e){alert('오류: '+e.message);}
}

// 이번 달 월 정기점검 전체 고유 호기 합산
function getAllMonthUnits(){
  if(!sched?.plans) return {total:0,doneByDate:{}};
  const now=new Date();
  const y=now.getFullYear(), m=now.getMonth();
  const lastDay=new Date(y,m+1,0).getDate();
  const seenUnitIds=new Set();
  let total=0;
  const doneByDate={};
  for(let d=1;d<=lastDay;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const groups=getSchedForDate(ds).filter(g=>!g.isCustom);
    if(!groups.length) continue;
    groups.forEach(g=>{
      g.bldData.forEach(({units:us})=>us.forEach(u=>{
        if(!seenUnitIds.has(u.id)){seenUnitIds.add(u.id);total++;}
      }));
      g.directUnits.forEach(u=>{
        if(!seenUnitIds.has(u.id)){seenUnitIds.add(u.id);total++;}
      });
    });
    // 해당 날짜 완료 대수
    const done=groups.reduce((s,g)=>
      s+g.bldData.reduce((ss,b)=>ss+b.units.filter(u=>isChecked(u.id,ds)).length,0)
       +g.directUnits.filter(u=>isChecked(u.id,ds)).length,0);
    if(done>0) doneByDate[ds]=done;
  }
  return {total,doneByDate};
}


function calMove(d){calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}renderCalendar();}

function renderCalendar(){
  const DOW=['일','월','화','수','목','금','토'];
  const t=todayStr();
  document.getElementById('cal-lbl').textContent=`${calY}년 ${calM+1}월`;

  // 이번 달 일정 맵
  const dayMap={};
  if(sched?.plans){
    Object.values(sched.plans).forEach(plan=>{
      if(!plan.schedule)return;
      Object.entries(plan.schedule).forEach(([ds,slots])=>{
        const[y,m]=ds.split('-');
        if(parseInt(y)!==calY||parseInt(m)-1!==calM)return;
        if(!Array.isArray(slots))return;
        slots.forEach(item=>{
          if(!item)return;
          if(!dayMap[ds])dayMap[ds]=[];
          if(typeof item==='object'){
            dayMap[ds].push({name:item.text||'',isCustom:true});
          } else {
            const lines=item.split('\n');
            const name=lines[0].trim();
            const bldRaw=lines[1]?.trim()||'';
            const {names:bns,includeShuttle:ish}=parseBldRange(bldRaw);
            if(!dayMap[ds].find(x=>x.name===name))
              dayMap[ds].push({name,bldText:bldRaw,bldNames:bns,includeShuttle:ish,isCustom:false});
          }
        });
      });
    });
  }

  let h=['월','화','수','목','금'].map(d=>`<div class="cal-dl">${d}</div>`).join('');
  // 월~금만 표시 (토/일 제외)
  const last=new Date(calY,calM+1,0).getDate();
  // 1일의 요일: 0=일,1=월,...,5=금,6=토
  const firstDow=new Date(calY,calM,1).getDay();
  // 5열 그리드(월~금) 기준 첫 번째 빈 칸 수
  // 일=0→4칸, 월=1→0칸, 화=2→1칸, ..., 금=5→4칸, 토=6→3칸
  const dowToCol={0:4,1:0,2:1,3:2,4:3,5:4,6:3}; // 1일이 해당 요일일 때 앞 빈칸
  // 단, 일/토는 평일이 아니므로 첫 평일 찾기
  let blanks=0;
  for(let d=1;d<=last;d++){
    const dow=new Date(calY,calM,d).getDay();
    if(dow>=1&&dow<=5){blanks=(dow-1);break;} // 첫 평일의 요일 = 앞 빈칸 수
  }
  for(let i=0;i<blanks;i++) h+='<div></div>';
  for(let d=1;d<=last;d++){
    const dow=new Date(calY,calM,d).getDay();
    if(dow===0||dow===6) continue; // 토/일 스킵
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const items=dayMap[ds]||[];
    const dotsHtml=items.slice(0,2).map(x=>`<div class="cal-dot${x.isCustom?' custom':''}">${x.isCustom?'★':''} ${x.name}${(!x.isCustom&&x.includeShuttle)?'<span style="font-size:9px;color:var(--amber)"> +셔틀</span>':''}</div>`).join('');
    const more=items.length>2?`<div class="cal-dot" style="color:var(--txt3)">+${items.length-2}</div>`:'';
    h+=`<div class="cal-cell${ds===t?' today':''}${ds===calSel?' selected':''}${items.length?' has-sched':''}" onclick="calClick('${ds}')">
      <div class="cal-num">${d}</div>
      <div class="cal-dots">${dotsHtml}${more}</div>
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML=h;
  if(calSel)renderCalDetail(calSel);
}

// ══ 현장 탭 ══════════════════════════════════════════════════════
function renderSites(){
  const q=document.getElementById('site-q').value.toLowerCase();
  const el=document.getElementById('sites-list');
  const fs=sites.filter(s=>s.name.toLowerCase().includes(q));
  if(!fs.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">🏢</div><div class="empty-text">등록된 현장이 없습니다<br>+ 현장 버튼으로 추가하세요</div></div>';
    return;
  }
  el.innerHTML=fs.map(site=>{
    const blds=buildings.filter(b=>b.site_id===site.id);
    const nbu=units.filter(u=>u.site_id===site.id&&!u.building_id);
    const nc=notes.filter(n=>n.site_name===site.name).length;
    const sg=site.sched_group?`<span class="badge badge-blue" style="font-size:10px">${site.sched_group}</span>`:'';

    let tree='';
    blds.forEach(b=>{
      const bu=units.filter(u=>u.building_id===b.id);
      tree+=`<div class="tree-bld"><span>📦 ${b.name} <span style="color:var(--txt3);font-weight:400">${bu.length}호기</span></span>
        <div style="display:flex;gap:4px">
          <button class="btn btn-sm btn-ghost" onclick="openUnitModal('${site.id}','${b.id}','${escQ(site.name+' / '+b.name)}')">＋ 호기</button>
          <button class="btn btn-sm btn-danger" onclick="delBuilding('${b.id}')">삭제</button>
        </div></div>`;
      bu.forEach(u=>{tree+=`<div class="tree-unit"><span>🔲 ${u.name}</span><button class="btn btn-sm btn-danger" onclick="delUnit('${u.id}')">삭제</button></div>`;});
    });
    // 동 없는 호기 — 별도 섹션으로 구분
    if(nbu.length){
      tree+=`<div class="tree-bld"><span>📦 셔틀호기 (동 미지정) <span style="color:var(--txt3);font-weight:400">${nbu.length}호기</span></span>
        <div style="display:flex;gap:4px"></div></div>`;
      nbu.forEach(u=>{
        const sg=getUnitGroup(u.id);
        const grpLabel=sg?(sg.split('\n')[1]||sg.split('\n')[0]):'미지정';
        const grpColor=sg?'badge-blue':'badge-gray';
        tree+=`<div class="tree-unit">
          <span>🔲 ${u.name}</span>
          <div style="display:flex;align-items:center;gap:6px;margin-left:auto">
            <span class="badge ${grpColor}" style="font-size:10px">${grpLabel}</span>
            <button class="btn btn-sm btn-ghost" onclick="openEditUnitGroup('${u.id}','${escQ(site.id)}')">그룹 변경</button>
            <button class="btn btn-sm btn-danger" onclick="delUnit('${u.id}')">삭제</button>
          </div>
        </div>`;
      });
    }

    const unitCount=blds.reduce((s,b)=>s+units.filter(u=>u.building_id===b.id).length,0)+nbu.length;
    return `<div class="tree-item">
      <div class="tree-head" onclick="toggleTree(this)">
        <span style="font-size:16px">🏢</span>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
            <span class="tree-label">${site.name}</span>${sg}
            ${nc?`<span class="badge badge-amber" style="font-size:10px">${nc}건</span>`:''}
          </div>
          <div class="tree-meta">${blds.length}동 ${unitCount}호기</div>
        </div>
        <span style="color:var(--txt3);font-size:12px">▾</span>
      </div>
      <div class="tree-body" style="display:none">
        ${tree}
        <div class="tree-actions">
          <button class="btn btn-sm btn-ghost" onclick="openBldModal('${site.id}','${escQ(site.name)}')">＋ 동</button>
          <button class="btn btn-sm btn-ghost" onclick="openUnitModal('${site.id}',null,'${escQ(site.name)} (동 없음)')">＋ 호기</button>
          <button class="btn btn-sm btn-ghost" onclick="openTL('${escQ(site.name)}')">📋 이력</button>
          <button class="btn btn-sm btn-ghost" onclick="openRegSite('${site.id}')">＋ 기록</button>
          <button class="btn btn-sm" style="background:var(--amberl);color:var(--amber)" onclick="openEditSite('${site.id}','${escQ(site.name)}','${escQ(site.address||"")}','${escQ(site.sched_group||"")}')" >✏️ 수정</button>
          <button class="btn btn-sm btn-danger" onclick="delSite('${site.id}')">현장삭제</button>
        </div>
      </div>
    </div>`;
  }).join('');
}
function escQ(s){return s.replace(/'/g,"\\'");}
function toggleTree(el){const b=el.nextElementSibling;b.style.display=b.style.display==='none'?'block':'none';el.querySelector('span:last-child').textContent=b.style.display==='block'?'▴':'▾';}

function toggleDD(type){

      </div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <button class="btn btn-sm" style="background:${e.done?'var(--greenl)':'var(--bg3)'};color:${e.done?'var(--green)':'var(--txt3)'};border:1px solid ${e.done?'#6EE7B7':'var(--border2)'}" onclick="doneEvent('${e.id}',${e.done})">${e.done?'✅ 완료':'○ 미완료'}</button>

      </div>

function openTL(sname){
  const items=[];
  notes.filter(n=>n.site_name===sname).forEach(n=>items.push({t:'note',date:(n.created_at||'').slice(0,10),unit:n.unit_name,text:n.content,wtype:null,nick:nickMap[n.user_id]||null}));
  maint.filter(m=>m.site_name===sname).forEach(m=>items.push({t:'maint',date:m.worked_at||'',unit:m.unit_name,text:m.description,wtype:m.work_type,nick:nickMap[m.user_id]||null}));
  items.sort((a,b)=>b.date.localeCompare(a.date));
  const bm={교체:'var(--pl)',수리:'var(--amberl)',점검:'var(--greenl)',기타:'var(--bg3)'};
  const tc={교체:'var(--p)',수리:'var(--amber)',점검:'var(--green)',기타:'var(--txt3)'};
  document.getElementById('tl-title').textContent=`📋 ${sname}`;
  document.getElementById('tl-content').innerHTML=items.length?items.map(it=>`
    <div class="tl-item">
      <div class="tl-dot ${it.t==='note'?'tl-note-dot':'tl-maint-dot'}">${it.t==='note'?'📌':'🔧'}</div>
      <div class="tl-content">
        <div class="tl-top">
          <span class="tl-date">${it.date}</span>
          ${it.nick?`<span class="tl-author">${it.nick}</span>`:''}
          ${it.unit?`<span style="font-size:11px;color:var(--txt3)">${it.unit}</span>`:''}
          ${it.wtype?`<span class="badge" style="background:${bm[it.wtype]};color:${tc[it.wtype]};font-size:10px">${it.wtype}</span>`:''}
        </div>
        ${it.text?`<div class="tl-body">${it.text}</div>`:''}
      </div>
    </div>`).join(''):'<div class="empty"><div class="empty-text">기록이 없습니다</div></div>';
  document.getElementById('tl-modal').style.display='flex';
}

// ══ 저장 ════════════════════════════════════════════════════════
async function saveReg(){
  const sid=document.getElementById('r-site').value;
  if(!sid){alert('현장을 선택하세요.');return;}
  const bid=document.getElementById('r-bld').value||null;
  const uid=document.getElementById('r-unit').value||null;
  const sname=getSN(sid);
  let uname=null;
  if(uid){const inf=getUnitInfo(uid);uname=inf.name;}
  else if(bid){uname=getBN(bid);}
  const d=document.getElementById('r-mdesc').value.trim();
  const dt=document.getElementById('r-mdate').value;
  if(!d||!dt){alert('날짜와 내용을 입력하세요.');return;}
  try{
    await api('POST','maintenance',{user_id:me.id,unit_id:uid||null,site_name:sname,unit_name:uname,work_type:document.getElementById('r-mtype').value,description:d,worked_at:dt,is_done:false});
    closeMo('reg-modal');await loadAll();renderHome();renderInsp_();renderMaint();buildMaintDD();renderSites();
  }catch(e){alert('저장 오류: '+e.message);}
}
function renderInsp_(){if(calSel)renderCalDetail(calSel);else renderCalendar();}

async function saveSite(){
  const name=document.getElementById('sm-name').value.trim();
  if(!name){alert('아파트명을 입력하세요.');return;}
  const addr=document.getElementById('sm-addr').value.trim();
  const sg=document.getElementById('sm-sgroup').value.trim();
  const editId=document.getElementById('sm-edit-id').value;
  try{
    if(editId){
      await api('PATCH',`sites?id=eq.${editId}`,{name,address:addr||null,sched_group:sg||null});
    } else {
      await api('POST','sites',{user_id:masterUid(),name,address:addr||null,sched_group:sg||null});
    }
    closeMo('site-modal');await loadAll();renderSites();renderHome();renderInsp_();syncSiteSels();
  }catch(e){alert('오류: '+e.message);}
}
async function saveBuilding(){
  const name=document.getElementById('bm-name').value.trim();
  if(!name){alert('동 이름을 입력하세요.');return;}
  try{await api('POST','buildings',{site_id:bldSid,name});closeMo('bld-modal');await loadAll();renderSites();renderInsp_();}
  catch(e){alert('오류: '+e.message);}
}
async function saveUnit(){
  const name=document.getElementById('um-name').value.trim();
  if(!name){alert('호기 이름을 입력하세요.');return;}
  const sg=unitBid?null:(document.getElementById('um-sgroup').value.trim()||null);
  try{

    closeMo('unit-modal');await loadAll();renderSites();renderInsp_();syncSiteSels();
  }catch(e){alert('오류: '+e.message);}

async function saveEvent(){

}

function pickSchedGroup(name,el){
  document.getElementById('sm-sgroup').value=name;
  if(name&&!document.getElementById('sm-name').value) document.getElementById('sm-name').value=name;
  document.querySelectorAll('#sm-sched-picker .sched-pick-item').forEach(e=>{
    e.classList.remove('selected');
    const c=e.querySelector('.spi-check');if(c)c.style.display='none';
  });
  el.classList.add('selected');
  const chk=el.querySelector('.spi-check');if(chk)chk.style.display='';
}
function getSchedSiteNames(){
  if(!sched?.plans)return[];
  const seen=new Set();
  Object.values(sched.plans).forEach(plan=>{
    Object.values(plan.schedule||{}).flat().forEach(item=>{
      if(item&&typeof item==='string'){const n=item.split('\n')[0].trim();seen.add(n);}
    });
  });
  return [...seen].sort();
}

function openUnitModal(sid,bid,label){
  unitSid=sid;unitBid=bid||null;
  document.getElementById('unit-lbl').textContent=label;
  document.getElementById('um-name').value='';
  document.getElementById('um-sgroup').value='';
  const wrap=document.getElementById('um-sgroup-wrap');
  // 동 없는 호기일 때만 그룹 선택 표시
  if(!bid){
    wrap.style.display='block';
    // 현장의 sched_group 기준으로 해당 현장이 속한 aptName의 하위 그룹 목록 생성
    const unitSchedGroups=getUnitSchedGroups(sid);
    const picker=document.getElementById('um-sched-picker');
    if(!unitSchedGroups.length){
      picker.innerHTML='<div style="padding:11px 14px;font-size:13px;color:var(--txt3)">점검계획표 데이터가 없습니다</div>';
    } else {
      picker.innerHTML=`<div class="sched-pick-item selected" onclick="event.stopPropagation();pickUnitSchedGroup(-1,this)"><span class="spi-name">지정 안 함</span><span class="spi-check">✓</span></div>`+
        unitSchedGroups.map((g,i)=>`<div class="sched-pick-item" onclick="event.stopPropagation();pickUnitSchedGroup(${i},this)">
          <div><div class="spi-name">${g.label}</div></div>
          <span class="spi-check" style="display:none">✓</span>
        </div>`).join('');
    }
  } else {
    wrap.style.display='none';
  }
  document.getElementById('unit-modal').style.display='flex';
}
let _unitSchedGroupsCache=[];
function getUnitSchedGroups(sid){
  const site=sites.find(s=>s.id===sid);
  if(!site||!sched?.plans){_unitSchedGroupsCache=[];return[];}
  const aptName=site.sched_group||site.name;
  const seen=new Set();const result=[];
  Object.values(sched.plans).forEach(plan=>{
    Object.values(plan.schedule||{}).flat().forEach(item=>{
      if(!item||typeof item!=='string')return;
      const lines=item.split('\n');
      const name=lines[0].trim();
      const bldText=lines[1]?.trim()||'';
      if(name!==aptName&&!name.startsWith(aptName))return;
      const key=bldText?`${name}\n${bldText}`:name;
      if(seen.has(key))return;
      seen.add(key);
      result.push({key,label:bldText||name,aptName:name,bldText});
    });
  });
  _unitSchedGroupsCache=result;
  return result;
}
function pickUnitSchedGroup(idx,el){
  const key=idx===-1?'':((_unitSchedGroupsCache[idx]||{}).key||'');
  document.getElementById('um-sgroup').value=key;
  document.querySelectorAll('#um-sched-picker .sched-pick-item').forEach(e=>{
    e.classList.remove('selected');
    const c=e.querySelector('.spi-check');if(c)c.style.display='none';
  });
  el.classList.add('selected');
  const chk=el.querySelector('.spi-check');if(chk)chk.style.display='';
}
function pickUGMGroup(idx,el){
  const key=idx===-1?'':((_unitSchedGroupsCache[idx]||{}).key||'');

}

  });
  document.querySelectorAll('#panel-history .sw-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(key==='maint'){buildMaintDD();renderMaint();}

}
